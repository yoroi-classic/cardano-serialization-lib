name: Package Metadata

on:
  pull_request:
    paths:
      - '.github/workflows/package-metadata.yml'
      - 'package.json'
      - 'scripts/build-helper.js'
      - 'scripts/build-helper.test.js'
      - 'scripts/publish-helper.js'
      - 'scripts/publish-helper.test.js'

permissions:
  contents: read

jobs:
  publish-helper:
    name: publish-helper
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install test dependencies
        run: npm ci --ignore-scripts

      - name: Test generated package metadata
        run: npm run test:publish-helper
